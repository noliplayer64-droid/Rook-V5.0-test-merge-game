<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eagle's Emoji Merge & Swipe Snake</title>
    <style>
        :root { --cyan: #00FFFF; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; touch-action: none; margin: 0; }
        h1 { color: var(--cyan); text-shadow: 0 0 15px var(--cyan); margin: 10px 0; font-size: 1.5rem; }
        .stats { font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid var(--cyan); width: 100%; text-align: center; padding: 10px; background: #000; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 80px); grid-gap: 10px; background: #1a1a1a; padding: 15px; border: 2px solid var(--cyan); border-radius: 8px; }
        .cell { width: 80px; height: 80px; background: #222; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; border-radius: 4px; cursor: pointer; }

        .controls { margin-top: 15px; display: flex; gap: 8px; }
        button { padding: 10px 15px; background: black; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* Snake Arena Overlay */
        #arena-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        canvas { background: #000; border: 2px solid var(--cyan); max-width: 90vw; max-height: 70vh; }
        .arena-info { color: var(--cyan); margin-bottom: 10px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="stats">
        WALLET: <span id="money">100</span>💰 | HIGHEST: <span id="best-display">😁</span>
    </div>

    <h1>CYAN MERGE</h1>
    <div class="grid" id="grid"></div>

    <div class="controls">
        <button onclick="spawnEmoji()">BUY 10</button>
        <button onclick="openGacha()" style="color:gold; border-color:gold;">GAMBLE</button>
        <button onclick="toggleArena(true)">SNAKE PIT 🐍</button>
    </div>

    <!-- ARENA -->
    <div id="arena-overlay">
        <div class="arena-info">
            SWIPE TO MOVE | Head: <span id="player-head-label">😁</span><br>
            Size: <span id="player-size">1</span> | Coins: <span id="session-coins">0</span>
        </div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <br>
        <button onclick="toggleArena(false)">EXIT & COLLECT</button>
    </div>

    <script>
        const tiers = ["😁", "😂", "😛", "🤯", "🫥", "💀", "🐔", "👽", "🦈", "👾", "🐺", "🐍"];
        const rares = ["😇", "🤪", "👻", "🦂", "🐊", "🫃", "🥀"];
        let wallet = 100, gridData = Array(9).fill(null), selectedIdx = null, playerBestEmoji = "😁";

        function updateUI() {
            document.getElementById('money').innerText = wallet;
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            let maxTier = 0;
            gridData.forEach((emoji, i) => {
                if(emoji) { let ti = tiers.indexOf(emoji); if(ti > maxTier) maxTier = ti; }
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = emoji || '';
                if(selectedIdx === i) cell.style.boxShadow = "0 0 15px white";
                cell.onclick = () => handleMerge(i);
                gridEl.appendChild(cell);
            });
            playerBestEmoji = tiers[maxTier];
            document.getElementById('best-display').innerText = playerBestEmoji;
        }

        function handleMerge(i) {
            if (selectedIdx === null) { if(gridData[i]) selectedIdx = i; }
            else {
                if (i !== selectedIdx && gridData[i] === gridData[selectedIdx]) {
                    const idx = tiers.indexOf(gridData[i]);
                    if (idx < tiers.length - 1) { gridData[i] = tiers[idx+1]; gridData[selectedIdx] = null; wallet += 15; }
                } else { [gridData[i], gridData[selectedIdx]] = [gridData[selectedIdx], gridData[i]]; }
                selectedIdx = null;
            }
            updateUI();
        }

        function spawnEmoji() { if(wallet >= 10 && gridData.includes(null)) { wallet -= 10; gridData[gridData.indexOf(null)] = tiers[0]; updateUI(); } }
        function openGacha() { if(wallet >= 50) { wallet -= 50; if(Math.random()<0.25) alert("RARE UNLOCKED!"); updateUI(); } }

        // --- SNAKE LOGIC ---
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        let snake, food, cpus, dx, dy, sessionCoins, gameInterval;

        function toggleArena(show) {
            document.getElementById('arena-overlay').style.display = show ? 'flex' : 'none';
            if(show) {
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0; sessionCoins = 0;
                food = {x: 5, y: 5};
                cpus = [{x: 5, y: 15, dx: 1, dy: 0, size: 2, emoji: '🤡'}];
                document.getElementById('player-head-label').innerText = playerBestEmoji;
                gameInterval = setInterval(gameLoop, 150);
            } else { clearInterval(gameInterval); wallet += sessionCoins; updateUI(); }
        }

        // SWIPE DETECTION
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, false);
        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; } else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; } else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; }
            }
        }, false);

        // KEYS 
        document.addEventListener('keydown', e => {
            if((e.key==='ArrowUp'||e.key==='w') && dy===0) {dx=0; dy=-1;}
            if((e.key==='ArrowDown'||e.key==='s') && dy===0) {dx=0; dy=1;}
            if((e.key==='ArrowLeft'||e.key==='a') && dx===0) {dx=-1; dy=0;}
            if((e.key==='ArrowRight'||e.key==='d') && dx===0) {dx=1; dy=0;}
        });

        function gameLoop() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if(head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                sessionCoins += 5;
            } else { snake.pop(); }
            if(head.x<0||head.x>=20||head.y<0||head.y>=20) return resetGame();
            snake.unshift(head);

            cpus.forEach(cpu => {
                cpu.x = (cpu.x + cpu.dx + 20)%20; cpu.y = (cpu.y + cpu.dy + 20)%20;
                if(head.x === cpu.x && head.y === cpu.y) {
                    if(snake.length > cpu.size) { sessionCoins += 50; cpu.x = -5; } else resetGame();
                }
            });

            ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400); ctx.font = "20px Arial";
            ctx.fillText("🍎", food.x*20, food.y*20 + 20);
            snake.forEach((p, i) => ctx.fillText(i===0 ? playerBestEmoji : "💠", p.x*20, p.y*20 + 20));
            cpus.forEach(c => ctx.fillText(c.emoji, c.x*20, c.y*20 + 20));
            document.getElementById('player-size').innerText = snake.length;
            document.getElementById('session-coins').innerText = sessionCoins;
        }
        function resetGame() { snake = [{x: 10, y: 10}]; dx = 1; dy = 0; }
        updateUI();
    </script>
</body>
</html>
