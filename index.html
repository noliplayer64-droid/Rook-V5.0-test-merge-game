<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle's Emoji Merge & Snake Pit</title>
    <style>
        :root {
            --cyan: #00FFFF;
            --dark: #121212;
            --gray: #1e1e1e;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .stats { margin-bottom: 10px; font-size: 1.2rem; }
        
        /* Grid Styles */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
            background: var(--gray);
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--cyan);
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .cell:hover { transform: scale(1.05); background: #333; }

        /* Buttons and UI */
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: var(--cyan); color: black; }
        
        .collection { margin-top: 20px; max-width: 320px; text-align: center; }
        .rare-box { font-size: 1.5rem; letter-spacing: 5px; color: gold; }

        /* Snake Game Overlay */
        #snake-ui {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 3px solid var(--cyan);
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Rook's 🦅 Cyan Engine</h1>
    
    <div class="stats">
        Wallet: <span id="money">100</span>💰 | 
        Main: <span id="current-emoji">😁</span>
    </div>

    <div class="grid" id="grid">
        <!-- 9 cells generated by JS -->
    </div>

    <div class="controls">
        <button onclick="spawnEmoji()">Buy Emoji (10💰)</button>
        <button onclick="openGacha()" style="border-color: gold; color: gold;">Gamble (50💰)</button>
        <button onclick="startSnake()">Snake Pit 🐍</button>
    </div>

    <div class="collection">
        <h3>Rare Collection</h3>
        <div id="rares" class="rare-box">---</div>
    </div>

    <div id="snake-ui">
        <h2>Snake Battle Royale</h2>
        <p id="snake-log">Eat players smaller than you!</p>
        <div id="snake-display" style="font-size: 2rem; margin: 10px;"></div>
        <button onclick="closeSnake()">Exit Pit</button>
    </div>

    <script>
        const tiers = ["😁", "😂", "😛", "🤯", "🫥", "💀", "🐔", "👽", "🦈", "👾", "🐺", "🐍"];
        const rares = ["😇", "🤪", "👻", "🦂", "🐊", "🫃", "🥀"];
        let wallet = 100;
        let gridData = Array(9).fill(null);
        let selectedIndex = null;

        function updateUI() {
            document.getElementById('money').innerText = wallet;
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridData.forEach((emoji, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = emoji || '';
                if(selectedIndex === i) cell.style.border = "2px solid var(--cyan)";
                cell.onclick = () => handleCellClick(i);
                gridEl.appendChild(cell);
            });
        }

        function handleCellClick(i) {
            if (selectedIndex === null) {
                if (gridData[i]) selectedIndex = i;
            } else {
                if (i !== selectedIndex && gridData[i] === gridData[selectedIndex]) {
                    // Merge logic
                    const idx = tiers.indexOf(gridData[i]);
                    if (idx !== -1 && idx < tiers.length - 1) {
                        gridData[i] = tiers[idx + 1];
                        gridData[selectedIndex] = null;
                        wallet += 20;
                    }
                } else {
                    // Swap logic
                    let temp = gridData[i];
                    gridData[i] = gridData[selectedIndex];
                    gridData[selectedIndex] = temp;
                }
                selectedIndex = null;
            }
            updateUI();
        }

        function spawnEmoji() {
            if (wallet >= 10) {
                const emptyIdx = gridData.indexOf(null);
                if (emptyIdx !== -1) {
                    wallet -= 10;
                    gridData[emptyIdx] = tiers[0];
                    updateUI();
                }
            }
        }

        function openGacha() {
            if (wallet >= 50) {
                wallet -= 50;
                if (Math.random() < 0.3) {
                    const found = rares[Math.floor(Math.random() * rares.length)];
                    document.getElementById('rares').innerText += found;
                    alert("LEGENDARY PULL: " + found);
                } else {
                    alert("You rolled... total trash. Try again!");
                }
                updateUI();
            }
        }

        // Snake Mini-Game Sim
        function startSnake() {
            document.getElementById('snake-ui').style.display = 'block';
            let playerSize = 1;
            let log = document.getElementById('snake-log');
            let display = document.getElementById('snake-display');
            
            const battle = setInterval(() => {
                let opp = Math.floor(Math.random() * 5) + 1;
                if (playerSize >= opp) {
                    playerSize++;
                    wallet += 5;
                    log.innerText = `You ATE a size ${opp} player! NOM!`;
                } else {
                    log.innerText = `A size ${opp} player bit you! OUCH!`;
                    playerSize = Math.max(1, playerSize - 1);
                }
                display.innerText = "🐍" + "🟢".repeat(playerSize);
                updateUI();
            }, 1000);

            // Stop after 5 seconds
            setTimeout(() => { 
                clearInterval(battle); 
                log.innerText += " Battle finished! Wallet updated.";
            }, 6000);
        }

        function closeSnake() {
            document.getElementById('snake-ui').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
